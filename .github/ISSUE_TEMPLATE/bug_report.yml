name: Bug report
description: Report a reproducible problem in vpn-tools
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide as much detail as possible.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Clear and concise description of the issue.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Exact commands/steps to reproduce.
      placeholder: |
        1. Run ...
        2. Observe ...
    validations:
      required: true
  - type: input
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs/output
      description: Paste non-sensitive logs only.
      render: shell
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: e.g. 3.9.6
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. macOS 14, Ubuntu 22.04
  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmation
      options:
        - label: I removed sensitive information from logs and screenshots.
          required: true
